<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test - Charts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h1><i class="fas fa-chart-line me-2"></i>Dashboard Charts Test</h1>
                <p class="text-muted">Testing AJAX-powered dashboard charts with Chart.js</p>
            </div>
        </div>

        <div class="row">
            <!-- Pie Chart Test -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-pie me-2"></i>Category Distribution</h5>
                    </div>
                    <div class="card-body" id="pieChartContainer">
                        <!-- Chart will be injected here by dashboard.js -->
                    </div>
                </div>
            </div>

            <!-- Bar Chart Test -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-bar me-2"></i>Monthly Trends</h5>
                    </div>
                    <div class="card-body" id="barChartContainer">
                        <!-- Chart will be injected here by dashboard.js -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6><i class="fas fa-cogs me-2"></i>Dashboard Controls</h6>
                        <div class="d-flex gap-2">
                            <button id="refreshBtn" class="btn btn-primary">
                                <i class="fas fa-sync-alt me-1"></i>Refresh Data
                            </button>
                            <button id="startAutoBtn" class="btn btn-success">
                                <i class="fas fa-play me-1"></i>Start Auto-Refresh
                            </button>
                            <button id="stopAutoBtn" class="btn btn-warning">
                                <i class="fas fa-pause me-1"></i>Stop Auto-Refresh
                            </button>
                            <div id="status" class="alert alert-info ms-3 mb-0 py-2 px-3">
                                <i class="fas fa-info-circle me-1"></i>Ready
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- API Test Results -->
        <div class="row mt-4">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <h6><i class="fas fa-terminal me-2"></i>API Response Log</h6>
                    </div>
                    <div class="card-body">
                        <pre id="apiLog" class="bg-dark text-light p-3" style="height: 200px; overflow-y: auto;">
Dashboard initialized. Waiting for API calls...
                        </pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Test script to verify dashboard.js functionality
        let testDashboard = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Create test buttons functionality
            const refreshBtn = document.getElementById('refreshBtn');
            const startAutoBtn = document.getElementById('startAutoBtn');
            const stopAutoBtn = document.getElementById('stopAutoBtn');
            const statusEl = document.getElementById('status');
            const apiLog = document.getElementById('apiLog');

            function logMessage(message) {
                const timestamp = new Date().toLocaleTimeString();
                apiLog.textContent += `[${timestamp}] ${message}\n`;
                apiLog.scrollTop = apiLog.scrollHeight;
            }

            function updateStatus(message, type = 'info') {
                statusEl.className = `alert alert-${type} ms-3 mb-0 py-2 px-3`;
                statusEl.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : type === 'danger' ? 'times' : 'info'}-circle me-1"></i>${message}`;
            }

            // Test API endpoints
            async function testApiEndpoint(url, description) {
                try {
                    logMessage(`Testing ${description}: ${url}`);
                    const response = await fetch(url);
                    const data = await response.json();
                    logMessage(`✅ ${description} - Status: ${response.status}, Data: ${JSON.stringify(data).substring(0, 100)}...`);
                    return data;
                } catch (error) {
                    logMessage(`❌ ${description} - Error: ${error.message}`);
                    return null;
                }
            }

            refreshBtn.addEventListener('click', async function() {
                updateStatus('Testing API endpoints...', 'warning');
                
                await testApiEndpoint('/api/expenses/by-category', 'Category Data');
                await testApiEndpoint('/api/expenses/monthly-trends', 'Monthly Trends');
                await testApiEndpoint('/api/expenses/dashboard-summary', 'Dashboard Summary');
                await testApiEndpoint('/api/expenses/recent?limit=5', 'Recent Expenses');
                await testApiEndpoint('/api/expenses/health', 'Health Check');
                
                updateStatus('API tests completed', 'success');
            });

            startAutoBtn.addEventListener('click', function() {
                updateStatus('Auto-refresh functionality would start here', 'success');
                logMessage('Auto-refresh simulation started (30s intervals)');
            });

            stopAutoBtn.addEventListener('click', function() {
                updateStatus('Auto-refresh functionality would stop here', 'warning');
                logMessage('Auto-refresh simulation stopped');
            });

            logMessage('Test page loaded successfully');
            updateStatus('Ready to test dashboard functionality');
        });
    </script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
