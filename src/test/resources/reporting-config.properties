# Test Reporting Configuration Properties
# Configure various reporting tools and integrations

# ExtentReports Configuration
extent.reports.enabled=true
extent.reports.theme=STANDARD
extent.reports.document.title=Expense Tracker - E2E Test Report
extent.reports.report.name=Personal Expense Tracker Test Execution Report
extent.reports.timestamp.format=MMM dd, yyyy HH:mm:ss
extent.reports.screenshots.enabled=true
extent.reports.screenshots.on.failure=true
extent.reports.screenshots.on.pass=false

# Allure Configuration
allure.results.directory=target/allure-results
allure.reports.directory=target/allure-reports
allure.enabled=true
allure.severity.blocker=true
allure.severity.critical=true
allure.categories.file=allure/categories.json

# JaCoCo Configuration
jacoco.enabled=true
jacoco.output.directory=target/jacoco
jacoco.threshold.line=80
jacoco.threshold.branch=75
jacoco.threshold.method=85
jacoco.threshold.class=90

# Email Notification Configuration
email.notification.enabled=false
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.starttls.enable=true
email.from.address=noreply@expensetracker.com
email.to.addresses=team@expensetracker.com,qa@expensetracker.com
email.subject.prefix=[Expense Tracker Tests]

# Test Metrics and KPI Configuration
metrics.enabled=true
metrics.history.enabled=true
metrics.history.days=30
metrics.trend.analysis=true
metrics.export.csv=true
metrics.export.json=true
metrics.dashboard.enabled=true

# CI/CD Integration
ci.github.actions.enabled=true
ci.jenkins.enabled=true
ci.build.number=${BUILD_NUMBER:-local}
ci.build.url=${BUILD_URL:-local}
ci.git.branch=${GIT_BRANCH:-local}
ci.git.commit=${GIT_COMMIT:-local}