# Test Configuration Properties
# Expense Tracker E2E Testing Framework Configuration

# Application Configuration
app.base.url=http://localhost:8080
app.title=Personal Expense Tracker

# Browser Configuration
browser.default=chrome
browser.headless=false
browser.maximize=true
browser.implicit.wait=10
browser.page.load.timeout=30
browser.script.timeout=30

# WebDriver Configuration
webdriver.download.dir=downloads
webdriver.auto.download=true
webdriver.disable.notifications=true
webdriver.disable.extensions=true
webdriver.disable.images=false
webdriver.disable.javascript=false

# Test Environment
test.environment=local
test.data.file=test-data.json

# Test Execution Configuration
test.parallel.count=2
test.max.retry.count=1
test.take.screenshot.on.failure=true
test.capture.video=false

# Directories
screenshots.dir=test-output/screenshots
reports.dir=test-output/reports
downloads.dir=test-output/downloads
logs.dir=test-output/logs

# Wait Configuration
wait.explicit.timeout=15
wait.implicit.timeout=10
wait.page.load.timeout=30
wait.script.timeout=30
wait.poll.frequency=500

# Database Configuration (for test data setup)
db.url=jdbc:h2:mem:testdb
db.username=sa
db.password=
db.driver=org.h2.Driver

# API Configuration (for API tests)
api.base.url=http://localhost:8080/api
api.timeout=30
api.content.type=application/json

# ExtentReports Configuration
reports.title=Expense Tracker - E2E Test Report
reports.theme=standard
reports.encoding=UTF-8
reports.timestamp.format=MMM dd, yyyy HH:mm:ss

# Test Data Configuration
testdata.expense.default.amount=100.00
testdata.expense.default.category=Other
testdata.category.default.name=Test Category
testdata.category.default.description=Test Category Description

# Logging Configuration
logging.level=INFO
logging.console.enabled=true
logging.file.enabled=true
logging.file.max.size=10MB

# Performance Configuration
performance.monitoring.enabled=false
performance.threshold.page.load=5000
performance.threshold.api.response=2000

# Cross-browser Testing
cross.browser.enabled=false
cross.browser.list=chrome,firefox
cross.browser.parallel=false

# Mobile Testing Configuration
mobile.testing.enabled=false
mobile.device.name=iPhone 12
mobile.platform.name=iOS
mobile.platform.version=14.0

# CI/CD Configuration
ci.headless.override=true
ci.parallel.override=true
ci.reports.publish=true
ci.screenshots.cleanup=true

# Security Configuration
security.ssl.verify=false
security.basic.auth.enabled=false
security.basic.auth.username=
security.basic.auth.password=

# Cleanup Configuration
cleanup.screenshots.older.than.days=7
cleanup.reports.older.than.days=30
cleanup.logs.older.than.days=14
cleanup.downloads.on.test.start=true