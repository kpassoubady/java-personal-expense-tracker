name: E2E Test Execution with Comprehensive Reporting

on:
  push:
    branches: [ main, develop, day3/tests ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
      headless:
        description: 'Run in headless mode'
        required: true
        default: 'true'
        type: boolean
      environment:
        description: 'Test environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - local
          - staging
          - production

jobs:
  test-execution:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Maven Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Install Browser Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        # Install Chrome
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        # Install Firefox
        sudo apt-get install -y firefox
    
    - name: Start Application
      run: |
        mvn spring-boot:run &
        echo $! > app.pid
        # Wait for application to be ready
        timeout 60 bash -c 'until curl -s http://localhost:8080 > /dev/null; do sleep 1; done'
      
    - name: Run E2E Tests
      run: |
        mvn clean test \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true \
          -Denvironment=${{ github.event.inputs.environment || 'staging' }} \
          -DparallelCount=2 \
          -DBUILD_NUMBER=${{ github.run_number }} \
          -DBUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
          -DGIT_BRANCH=${{ github.ref_name }} \
          -DGIT_COMMIT=${{ github.sha }}
      continue-on-error: true
    
    - name: Stop Application
      if: always()
      run: |
        if [ -f app.pid ]; then
          kill $(cat app.pid) || true
        fi
    
    - name: Generate Allure Report
      if: always()
      run: |
        mvn allure:report
        
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-${{ matrix.browser }}
        path: |
          target/surefire-reports/
          target/allure-reports/
          test-output/
          target/site/jacoco/
        retention-days: 30
    
    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.browser }}
        path: test-output/screenshots/
        retention-days: 14
    
    - name: Publish Test Results
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: E2E Test Results (${{ matrix.browser }})
        path: target/surefire-reports/*.xml
        reporter: java-junit
    
    - name: Generate Test Summary
      if: always()
      run: |
        echo "## Test Execution Summary - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
        echo "Browser: ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
        echo "Environment: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
        echo "Build: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        
        # Extract test counts from surefire reports
        if [ -d "target/surefire-reports" ]; then
          TESTS=$(find target/surefire-reports -name "*.xml" -exec grep -h "tests=" {} \; | head -1 | sed 's/.*tests="\([^"]*\)".*/\1/')
          FAILURES=$(find target/surefire-reports -name "*.xml" -exec grep -h "failures=" {} \; | head -1 | sed 's/.*failures="\([^"]*\)".*/\1/')
          ERRORS=$(find target/surefire-reports -name "*.xml" -exec grep -h "errors=" {} \; | head -1 | sed 's/.*errors="\([^"]*\)".*/\1/')
          
          echo "Total Tests: ${TESTS:-0}" >> $GITHUB_STEP_SUMMARY
          echo "Failures: ${FAILURES:-0}" >> $GITHUB_STEP_SUMMARY
          echo "Errors: ${ERRORS:-0}" >> $GITHUB_STEP_SUMMARY
        fi

  notification:
    needs: test-execution
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Send Slack Notification
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "E2E Tests failed for ${{ github.repository }} on branch ${{ github.ref_name }}"
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Send Email Notification
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.SMTP_HOST }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "[Expense Tracker] E2E Tests Failed - Build #${{ github.run_number }}"
        body: |
          E2E Tests failed for repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Build Number: ${{ github.run_number }}
          
          View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: "noreply@expensetracker.com"